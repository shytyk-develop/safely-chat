<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liberty Line Web</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app-container">

    <div id="auth-screen" class="screen active">
        <h2>Welcome to SafeLy</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button id="login-btn">Login</button>
        <button id="register-btn" class="secondary-btn">Register</button>
        <p id="auth-error"></p>
    </div>

    <div id="menu-screen" class="screen">
        <div class="header">
            <h2>Main Menu</h2>
            <button id="logout-btn" class="secondary-btn">Logout</button>
        </div>
        
        <div class="search-box">
            <input type="text" id="search-query" placeholder="Enter username...">
            <button id="search-btn">Search</button>
        </div>
        
        <ul id="search-results"></ul>
    </div>

    <div id="chat-screen" class="screen">
        <div class="header">
            <button id="back-btn" class="secondary-btn">Back</button>
            <h3 id="chat-title">Chat</h3>
            <div style="width: 50px;"></div> </div>
        
        <div id="messages-container">
            </div>
        
        <div class="input-area">
            <input type="text" id="message-input" placeholder="Type a message...">
            <button id="send-btn">Send</button>
        </div>
    </div>

</div>

<script src="js/app.js"></script>
</body>
</html>
