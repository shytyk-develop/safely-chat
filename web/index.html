<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liberty Line Web</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app-container">

    <div id="auth-screen" class="screen active">
        <h2>Welcome to SafeLy</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button id="login-btn">Login</button>
        <button id="register-btn" class="secondary-btn">Register</button>
        <p id="auth-error"></p>
    </div>

    <div id="dashboard-screen" class="screen" style="padding: 0; flex-direction: row;">
        
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>My Chats</h2>
                <button id="logout-btn" class="icon-btn">Logout</button>
            </div>
            <ul id="chat-list">
                <div class="empty-text">No active chats. Use search to find users!</div>
            </ul>
        </div>

        <div class="main-workspace">
            
            <div class="top-bar">
                
                <div class="search-container">
                    <input type="text" id="search-query" placeholder="Find user...">
                    <button id="search-btn">🔍</button>
                    <ul id="search-results" class="dropdown-results"></ul>
                </div>
            </div>

            <div id="chat-area" style="display: none; flex-direction: column; flex-grow: 1;">
                <div id="messages-container"></div>
                
                <div class="input-area" style="padding: 15px; border-top: 1px solid #eee;">
                    <input type="text" id="message-input" placeholder="Type a message...">
                    <button id="send-btn">Send</button>
                </div>
            </div>
            
            <div id="no-chat-selected" class="no-chat-placeholder">
                <p>Select a chat on the left or search for a new user.</p>
            </div>

        </div>
    </div>

</div>

<script src="js/app.js"></script>
</body>
</html>
